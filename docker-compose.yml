version: '3.8'

services:
  backend:
    build: ./backend
    container_name: prismos-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build:
      context: .
      args:
        - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL}
    container_name: prismos-frontend
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      - backend
