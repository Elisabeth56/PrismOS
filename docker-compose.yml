version: '3.8'

services:
  backend:
    build: ./backend
    container_name: prismos-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.local
    restart: unless-stopped

  frontend:
    build: .
    container_name: prismos-frontend
    ports:
      - "80:3000"
    restart: unless-stopped
    depends_on:
      - backend
